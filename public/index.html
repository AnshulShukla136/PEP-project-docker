<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docker + Express App</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 48px;
            text-align: center;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #38bdf8;
        }

        p {
            color: #94a3b8;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #7dd3fc;
        }

        #response {
            margin-top: 24px;
            padding: 16px;
            background: #0f172a;
            border-radius: 8px;
            color: #4ade80;
            font-family: monospace;
            font-size: 0.95rem;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">🐳</div>
        <h1>Docker + Express</h1>
        <p>A simple containerized web app. Click the button to ping the API.</p>
        <button onclick="pingAPI()">Ping API</button>
        <div id="response">Response will appear here...</div>
    </div>

    <script>
        async function pingAPI() {
            const el = document.getElementById('response');
            el.textContent = 'Loading...';
            try {
                const res = await fetch('/api/hello');
                const data = await res.json();
                el.textContent = '✅ ' + data.message;
            } catch (err) {
                el.textContent = '❌ Error: ' + err.message;
            }
        }
    </script>
</body>

</html>
